<!DOCTYPE html>
<html>
<head>
  <title>Torto Cloud</title>
  <style>
    body { font-family: Arial; margin: 20px; }

    .device {
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .online { background: #e6ffed; }
    .offline { background: #ffe6e6; }

    .alert {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Torto Cloud Dashboard</h1>

<input id="email" placeholder="Email" />
<input id="password" type="password" placeholder="Password" />
<button onclick="login()">Login</button>

<br><br>

<button onclick="generateKey()">Generate API Key</button>
<p id="apikey"></p>

<h2>Devices</h2>
<div id="devices"></div>

<script>
let token = "";

/* LOGIN */
async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();
  token = data.token;

  alert("Login success");
  loadDevices();
}

/* GENERATE KEY */
async function generateKey() {
  const res = await fetch("/generate-key", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    }
  });

  const data = await res.json();
  document.getElementById("apikey").innerText = data.apiKey;
}

/* LOAD DEVICES */
async function loadDevices() {
  if (!token) return;

  const res = await fetch("/devices", {
    headers: { "Authorization": token }
  });

  const devices = await res.json();

  const container = document.getElementById("devices");
  container.innerHTML = "";

  devices.forEach(d => {
    const div = document.createElement("div");
    div.className = "device " + d.status;

    div.innerHTML = `
      <b>${d.deviceId}</b><br>
      CPU: ${d.cpu}% | RAM: ${d.ram}% | Disk: ${d.disk}%<br>
      Status: ${d.status}<br>
      ${d.alert ? `<span class="alert">${d.alert}</span>` : ""}
    `;

    container.appendChild(div);
  });
}

/* AUTO REFRESH */
setInterval(loadDevices, 5000);
</script>

</body>
</html>
