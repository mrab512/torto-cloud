<!DOCTYPE html>
<html>
<head>
  <title>Torto Cloud</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 5px 10px;
      cursor: pointer;
    }

    canvas {
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>🚀 Torto Cloud Dashboard</h1>

<div id="devices"></div>

<h2>📊 Metrics</h2>
<canvas id="cpuChart"></canvas>
<canvas id="ramChart"></canvas>
<canvas id="diskChart"></canvas>

<script>
let selectedDevice = null;

// ---------------- LOAD DEVICES ----------------
async function loadDevices() {
  const res = await fetch("/devices");
  const data = await res.json();

  const container = document.getElementById("devices");
  container.innerHTML = "";

  data.items.forEach(d => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${d.deviceId}</b><br>
      CPU: ${d.cpu}% | RAM: ${d.ram}% | Disk: ${d.disk}%<br>
      <button onclick="selectDevice('${d.deviceId}')">View Graph</button>
    `;

    container.appendChild(div);
  });
}

// ---------------- SELECT DEVICE ----------------
function selectDevice(id) {
  selectedDevice = id;
  loadMetrics();
}

// ---------------- CREATE CHARTS ----------------
const cpuChart = new Chart(document.getElementById("cpuChart"), {
  type: "line",
  data: { labels: [], datasets: [{ label: "CPU %", data: [] }] }
});

const ramChart = new Chart(document.getElementById("ramChart"), {
  type: "line",
  data: { labels: [], datasets: [{ label: "RAM %", data: [] }] }
});

const diskChart = new Chart(document.getElementById("diskChart"), {
  type: "line",
  data: { labels: [], datasets: [{ label: "Disk %", data: [] }] }
});

// ---------------- LOAD METRICS ----------------
async function loadMetrics() {
  if (!selectedDevice) return;

  const res = await fetch(`/metrics/${selectedDevice}`);
  const data = await res.json();

  const items = data.items.reverse();

  const labels = items.map(i =>
    new Date(i.timestamp).toLocaleTimeString()
  );

  cpuChart.data.labels = labels;
  cpuChart.data.datasets[0].data = items.map(i => i.cpu);

  ramChart.data.labels = labels;
  ramChart.data.datasets[0].data = items.map(i => i.ram);

  diskChart.data.labels = labels;
  diskChart.data.datasets[0].data = items.map(i => i.disk);

  cpuChart.update();
  ramChart.update();
  diskChart.update();
}

// ---------------- AUTO REFRESH ----------------
setInterval(() => {
  loadDevices();
  loadMetrics();
}, 5000);

// initial load
loadDevices();
</script>

</body>
</html>
